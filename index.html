<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>許願信用卡</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background: #fff1f2; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { 
            background: linear-gradient(135deg, #fda4af 0%, #fb7185 100%);
            width: 350px; height: 210px; border-radius: 20px; padding: 25px;
            color: white; box-shadow: 0 20px 40px rgba(251, 113, 133, 0.4);
            position: relative; box-sizing: border-box;
        }
        .chip { width: 50px; height: 38px; background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); border-radius: 8px; margin-bottom: 30px; }
        .label { font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .points { font-size: 48px; font-weight: bold; margin: 10px 0; font-family: monospace; }
        .holder { margin-top: 20px; font-size: 18px; letter-spacing: 2px; }
        button { 
            margin-top: 50px; padding: 15px 40px; border-radius: 50px; border: none;
            background: #e11d48; color: white; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="chip"></div>
        <div class="label">Wish Points 許願點數</div>
        <div class="points" id="balance">--</div>
        <div class="holder">HOLDER: <span id="user">TEST USER</span></div>
    </div>
    <button onclick="deduct()">✨ 扣除 1 點許願 ✨</button>

    <script>
        const SUPABASE_URL = 'https://supabase.co';
        const SUPABASE_KEY = 'sb_publishable_0ls2zg8ytXqYtJ2sutWfXQ_JWvb8lU-';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function load() {
            try {
                const { data, error } = await supabase.from('users_points').select('*').eq('username', 'test').single();
                if (data) {
                    document.getElementById('balance').innerText = data.balance.toString().padStart(2, '0');
                    document.getElementById('user').innerText = data.username.toUpperCase();
                } else {
                    document.getElementById('balance').innerText = "ERR";
                    console.error("找不到資料", error);
                }
            } catch (e) { console.error("連線錯誤", e); }
        }

        async function deduct() {
            let current = parseInt(document.getElementById('balance').innerText);
            if (isNaN(current) || current <= 0) return alert("點數沒囉！");

            const { error } = await supabase.from('users_points').update({ balance: current - 1 }).eq('username', 'test');

            if (!error) {
                alert("許願成功！");
                load();
            } else {
                alert("扣點失敗，請檢查 Supabase RLS 是否關閉");
            }
        }
        load();
    </script>
</body>
</html>
